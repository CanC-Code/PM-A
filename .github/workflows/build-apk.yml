name: Build WiiPM APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install 32-bit Libs
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libncurses6:i386 libstdc++6:i386 zlib1g:i386

      - name: Install SDK 23
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-23" "build-tools;23.0.2"

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Surgical Translator & Logic Patch
        run: |
          pip install Pillow
          python - <<EOF
          import os, re
          from PIL import Image

          # 1. Core Translation Mapping
          translations = {
              "图 鉴": "PokéDex", "地 图": "Map", "通 信": "Comm", "记 录": "Save",
              "战 斗": "Fight", "队 伍": "Team", "物 品": "Bag", "逃 跑": "Run",
              "返 回": "Back", "编号": "No.", "职业": "Class", "地区": "Region",
              "身份": "Rank", "属性": "Type", "特性": "Ability", "性格": "Nature",
              "物攻": "ATK", "物防": "DEF", "特攻": "SpA", "特防": "SpD", "速度": "SPD",
              "生命": "HP", "物防": "DEF", "重": "WT", "长": "HT", "蛋": "Egg",
              "遇": "Seen", "捕": "Got", "体力回复": "Restore HP", "状态回复": "Heal Status",
              "精灵球": "Pokéball", "战斗用品": "Battle Item", "神奥": "Sinnoh",
              "冠军": "Champ", "训练师": "Trainer", "家乡": "Home", "一城": "City 1",
              "二城": "City 2", "郊野": "Wilds", "森林": "Forest", "山区": "Mountain"
          }

          for root, dirs, files in os.walk("."):
              for file in files:
                  path = os.path.join(root, file)
                  if file.endswith((".java", ".xml")):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                              content = f.read()
                          
                          # Global String Translation
                          for cn, en in translations.items():
                              content = content.replace(cn, en)
                          
                          # MDraw: Fix Multiline Font Crash & Loop Boundary Crash
                          if file == "MDraw.java":
                              # Surgical Font Fix (re.DOTALL handles newlines)
                              content = re.sub(r'Typeface\.createFromAsset\(.*?\)\)', 'Typeface.DEFAULT)', content, flags=re.DOTALL)
                              # Loop Fix (Change <= ... + 1 to < ... to prevent IndexOutOfBounds)
                              content = content.replace("yy <= VData.allSIZE.y + 1", "yy < VData.allSIZE.y")
                              content = content.replace("xx <= VData.allSIZE.x + 1", "xx < VData.allSIZE.x")

                          # VData: Add Defensive Null Check for movement
                          if file == "VData.java":
                              content = content.replace("MDraw.logicMap[y][x]", "((MDraw.logicMap != null && y < MDraw.logicMap.length && x < MDraw.logicMap[0].length) ? MDraw.logicMap[y][x] : 0)")

                          # Build.gradle: Modern Repos
                          if file == "build.gradle":
                              content = content.replace("jcenter()", "mavenCentral()")
                              content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 26', content)

                          with open(path, 'w', encoding='utf-8') as f:
                              f.write(content)
                      except Exception as e: print(f"Skipping {file}: {e}")
          EOF

      - name: Build APK
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-English-Build
          path: app/build/outputs/apk/app-debug.apk
