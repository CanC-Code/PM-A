name: Build WiiPM APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK Components
        run: |
          # Use the pre-installed sdkmanager to get the old platform
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-23" "build-tools;23.0.1"
          # Sometimes the path varies on runners, fallback to the standard tools path if latest isn't there
          if [ $? -ne 0 ]; then
            echo "y" | $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-23" "build-tools;23.0.1"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate Dynamic Pokémon Icon
        run: |
          python - <<EOF
          import os, random
          from PIL import Image

          sprite_dir = 'app/src/main/res/drawable-hdpi'
          sprites = [f for f in os.listdir(sprite_dir) if f.startswith('pm') and f.endswith('.png')]
          
          if sprites:
              chosen = random.choice(sprites)
              print(f"I choose you, {chosen}!")
              sprite_img = Image.open(os.path.join(sprite_dir, chosen)).convert("RGBA")
          else:
              print("No sprites found, using fallback blue.")
              sprite_img = Image.new('RGBA', (128, 128), color=(0, 120, 215, 255))

          bg = Image.new('RGBA', (512, 512), color=(255, 255, 255, 255))
          sprite_img = sprite_img.resize((400, 400), Image.Resampling.NEAREST)
          bg.paste(sprite_img, (56, 56), sprite_img)
          bg.save('icon_source.png')

          targets = [
              ('mipmap-mdpi', 48),
              ('mipmap-hdpi', 72),
              ('mipmap-xhdpi', 96),
              ('mipmap-xxhdpi', 144),
          ]

          base_res_path = 'app/src/main/res'
          for folder, size in targets:
              dest_dir = os.path.join(base_res_path, folder)
              os.makedirs(dest_dir, exist_ok=True)
              resized = bg.resize((size, size), Image.Resampling.LANCZOS)
              resized.save(os.path.join(dest_dir, 'ic_launcher.png'))
          EOF

      - name: Sanitize and Fix Gradle
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
