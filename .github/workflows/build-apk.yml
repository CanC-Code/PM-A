name: Build WiiPM APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate Dynamic Icons
        run: |
          python - <<EOF
          import os
          from PIL import Image, ImageDraw

          # 1. Create source icon if it doesn't exist
          source_path = 'icon_source.png'
          if not os.path.exists(source_path):
              print("Creating placeholder blue icon...")
              img = Image.new('RGB', (512, 512), color=(0, 120, 215))
              img.save(source_path)

          # 2. Define targets based on your project structure
          # Format: (folder_name, size_in_pixels)
          targets = [
              ('mipmap-mdpi', 48),
              ('mipmap-hdpi', 72),
              ('mipmap-xhdpi', 96),
              ('mipmap-xxhdpi', 144),
          ]

          base_res_path = 'app/src/main/res'
          source_img = Image.open(source_path)

          for folder, size in targets:
              dest_dir = os.path.join(base_res_path, folder)
              os.makedirs(dest_dir, exist_ok=True)
              dest_path = os.path.join(dest_dir, 'ic_launcher.png')
              
              print(f"Generating {dest_path} ({size}x{size})...")
              resized = source_img.resize((size, size), Image.Resampling.LANCZOS)
              resized.save(dest_path)
          EOF

      - name: Sanitize and Fix Gradle
        run: |
          # Fix potential Windows line endings and ensure execution bits
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          # Ensure the wrapper directory exists (though your ls showed it does)
          mkdir -p gradle/wrapper

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
