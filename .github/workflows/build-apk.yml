name: Build WiiPM APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (for SDK Manager)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Legacy Android SDK 23 & 32-bit Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y lib32z1 lib32ncurses6 lib32stdc++6
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-23" "build-tools;23.0.2"

      - name: Set up JDK 8 (for Build)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compatibility Fixes and Dynamic Assets
        run: |
          pip install Pillow
          python - <<EOF
          import os, random, re
          from PIL import Image

          # 1. Repository Fixes & Disable Buggy PNG Cruncher
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file == "build.gradle":
                      path = os.path.join(root, file)
                      with open(path, 'r') as f:
                          content = f.read()
                      content = content.replace("jcenter()", "maven { url 'https://maven.google.com' }\n        mavenCentral()")
                      # Bump targetSdkVersion to 26 for better compatibility with newer OS versions
                      content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 26', content)
                      if 'android {' in content and 'aaptOptions' not in content:
                          content = content.replace('android {', 'android {\n    aaptOptions { cruncherEnabled = false; useNewCruncher = false }\n')
                      with open(path, 'w') as f:
                          f.write(content)

          # 2. Selective Manifest Fix
          manifest_path = 'app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r') as f:
                  content = f.read()
              
              # Inject Permissions
              if 'android.permission.WRITE_EXTERNAL_STORAGE' not in content:
                  perms = '\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />'
                  content = content.replace('<application', perms + '\n    <application')
              
              # Add exported="true" ONLY to the main activity if it is missing
              # This uses a regex to check for the attribute within the Activity_Main tag specifically
              activity_pattern = r'(<activity[^>]*?android:name="\.main\.Activity_Main"[^>]*?)>'
              def add_exported(match):
                  tag = match.group(1)
                  if 'android:exported' not in tag:
                      return tag + ' android:exported="true">'
                  return tag + '>'
              
              content = re.sub(activity_pattern, add_exported, content)
              
              # Add Legacy Storage Support
              if 'requestLegacyExternalStorage' not in content:
                  content = content.replace('<application', '<application android:requestLegacyExternalStorage="true"')

              with open(manifest_path, 'w') as f:
                  f.write(content)

          # 3. Dynamic Pokémon Icon Generation
          sprite_dir = 'app/src/main/res/drawable-hdpi'
          if os.path.exists(sprite_dir):
              sprites = [f for f in os.listdir(sprite_dir) if f.startswith('pm') and f.endswith('.png')]
              chosen = random.choice(sprites) if sprites else None
              if chosen:
                  sprite_img = Image.open(os.path.join(sprite_dir, chosen)).convert("RGBA")
                  # FIX: Size must be a 2-tuple (width, height)
                  bg = Image.new('RGBA', (512, 512), (255, 255, 255, 255))
                  sprite_img = sprite_img.resize((400, 400), Image.Resampling.NEAREST)
                  bg.paste(sprite_img, (56, 56), sprite_img)
                  
                  targets = [('mipmap-mdpi', 48), ('mipmap-hdpi', 72), ('mipmap-xhdpi', 96), ('mipmap-xxhdpi', 144)]
                  for folder, size in targets:
                      dest_dir = os.path.join('app/src/main/res', folder)
                      os.makedirs(dest_dir, exist_ok=True)
                      bg.resize((size, size), Image.Resampling.LANCZOS).save(os.path.join(dest_dir, 'ic_launcher.png'))
          EOF

      - name: Build Debug APK
        env:
          SLAVE_AAPT_TIMEOUT: 60
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-Compatibility-Build
          path: app/build/outputs/apk/app-debug.apk
