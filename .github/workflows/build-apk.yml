name: Build WiiPM APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run this manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Dynamic Icons
        run: |
          # If icon_source.png doesn't exist, we'll create a placeholder colored square
          if [ ! -f "icon_source.png" ]; then
            convert -size 512x512 xc:blue icon_source.png
          fi
          
          echo "Generating icons for all densities..."
          # Paths based on your 'ls' output
          convert icon_source.png -resize 48x48   app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon_source.png -resize 72x72   app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon_source.png -resize 96x96   app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon_source.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
