name: Build WiiPM APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Build Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Legacy 32-bit Compatibility Libs (Ubuntu 24.04)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          # Changed libncurses5:i386 to libncurses6:i386 for Ubuntu 24.04 compatibility
          sudo apt-get install -y libncurses6:i386 libstdc++6:i386 zlib1g:i386

      - name: Install SDK 23
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-23" "build-tools;23.0.2"

      - name: Set up JDK 8 (Compile)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Surgical Source Patcher
        run: |
          pip install Pillow
          python - <<EOF
          import os, random, re
          from PIL import Image

          # 1. Global build.gradle Patch
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file == "build.gradle":
                      path = os.path.join(root, file)
                      with open(path, 'r') as f:
                          content = f.read()
                      content = content.replace("jcenter()", "maven { url 'https://maven.google.com' }\n        mavenCentral()")
                      content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 26', content)
                      if 'aaptOptions' not in content:
                          content = content.replace('android {', 'android {\n    aaptOptions { cruncherEnabled = false; useNewCruncher = false }\n')
                      with open(path, 'w') as f: f.write(content)

          # 2. Manifest Launch & Permissions Fix
          manifest_path = 'app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r') as f: content = f.read()
              if 'android:exported' not in content:
                  content = content.replace('<activity', '<activity android:exported="true"')
              if 'android.permission.WRITE_EXTERNAL_STORAGE' not in content:
                  perms = '\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />'
                  content = content.replace('<application', perms + '\n    <application')
              with open(manifest_path, 'w') as f: f.write(content)

          # 3. IMain & UGifView Logic Patch
          # Protection for font loading
          imain_path = 'app/src/main/java/com/yurset/wiipm/main/IMain.java'
          if os.path.exists(imain_path):
              with open(imain_path, 'r') as f: content = f.read()
              font_fix = "try { mFace0 = Typeface.createFromAsset(getContext().getAssets(), \"fonts/lewime.ttf\"); mFace1 = Typeface.createFromAsset(getContext().getAssets(), \"fonts/moonlight.ttf\"); } catch (Exception e) { mFace0 = Typeface.DEFAULT; mFace1 = Typeface.DEFAULT; }"
              content = re.sub(r'mFace0 = Typeface\.createFromAsset\(.*?\);', '', content)
              content = re.sub(r'mFace1 = Typeface\.createFromAsset\(.*?\);', font_fix, content)
              with open(imain_path, 'w') as f: f.write(content)

          # Remove buggy bitmap.recycle()
          gif_path = 'app/src/main/java/com/yurset/wiipm/base/UGifView.java'
          if os.path.exists(gif_path):
              with open(gif_path, 'r') as f: content = f.read()
              content = re.sub(r'if \(mMovie != null\) \{.*?bitmap\.recycle\(\);.*?\}', '', content, flags=re.DOTALL)
              with open(gif_path, 'w') as f: f.write(content)

          # 4. Icon Generation
          sprite_dir = 'app/src/main/res/drawable-hdpi'
          if os.path.exists(sprite_dir):
              sprites = [f for f in os.listdir(sprite_dir) if f.startswith('pm') and f.endswith('.png')]
              chosen = random.choice(sprites) if sprites else None
              if chosen:
                  sprite_img = Image.open(os.path.join(sprite_dir, chosen)).convert("RGBA")
                  bg = Image.new('RGBA', (512, 512), (255, 255, 255, 255))
                  sprite_img = sprite_img.resize((400, 400), Image.Resampling.NEAREST)
                  bg.paste(sprite_img, (56, 56), sprite_img)
                  for folder, size in [('mipmap-mdpi', 48), ('mipmap-hdpi', 72), ('mipmap-xhdpi', 96), ('mipmap-xxhdpi', 144)]:
                      dest_dir = os.path.join('app/src/main/res', folder)
                      os.makedirs(dest_dir, exist_ok=True)
                      bg.resize((size, size), Image.Resampling.LANCZOS).save(os.path.join(dest_dir, 'ic_launcher.png'))
          EOF

      - name: Build Debug APK
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-Build
          path: app/build/outputs/apk/app-debug.apk
