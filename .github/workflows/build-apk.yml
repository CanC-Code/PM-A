name: Build WiiPM Stable & Translated

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install 32-bit Libs
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libncurses6:i386 libstdc++6:i386 zlib1g:i386

      - name: Install SDK 23
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-23" "build-tools;23.0.2"

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Dynamic Translator & Mega-Patcher
        run: |
          pip install Pillow
          python - <<EOF
          import os, random, re, json, urllib.request
          from PIL import Image

          # 1. Base UI Translation Dictionary
          translations = {
              "图 鉴": "Dex", "地 图": "Map", "通 信": "Link", "记 录": "Save",
              "战 斗": "Fight", "队 伍": "Team", "物 品": "Bag", "逃 跑": "Run",
              "返 回": "Back", "属性": "Type", "特性": "Ability", "性格": "Nature",
              "物攻": "ATK", "物防": "DEF", "特攻": "SpA", "特防": "SpD", "速度": "SPD",
              "生命": "HP", "编号": "No.", "职业": "Class", "地区": "Region", "身份": "Rank",
              "技能": "Moves", "经验": "EXP"
          }

          # 2. Dynamically Fetch Pokemon & Move Localizations
          print("Fetching dynamic localization data...")
          try:
              # Using a standard Pokemon open source data repository for CN->EN mappings
              req = urllib.request.Request("https://raw.githubusercontent.com/sindresorhus/pokemon/main/data/en.json", headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req) as response:
                  en_names = json.loads(response.read().decode())
              
              req_zh = urllib.request.Request("https://raw.githubusercontent.com/sindresorhus/pokemon/main/data/zh-hans.json", headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req_zh) as response:
                  zh_names = json.loads(response.read().decode())
              
              # Map Chinese names directly to English names
              for zh, en in zip(zh_names, en_names):
                  translations[zh] = en
              print(f"Successfully loaded {len(en_names)} Pokemon name translations.")
          except Exception as e:
              print(f"Notice: Could not fetch dynamic Pokemon names ({e}). Using base UI translations only.")

          # 3. Safe Translation Function (Protects Image Paths)
          def safe_translate(file_content):
              lines = file_content.split('\n')
              for i in range(len(lines)):
                  # Skip translating lines that define file paths to prevent missing sprites
                  if any(ext in lines[i].lower() for ext in ['.png', '.jpg', '.gif', 'assets/']):
                      continue
                  for cn, en in translations.items():
                      if cn in lines[i]:
                          lines[i] = lines[i].replace(cn, en)
              return '\n'.join(lines)

          # 4. Process Files (Java & XML & TXT)
          for root, dirs, files in os.walk("."):
              for file in files:
                  path = os.path.join(root, file)
                  if file.endswith((".java", ".xml", ".txt")):
                      try:
                          with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                              content = f.read()
                          
                          # Apply protected translation
                          content = safe_translate(content)
                          
                          if file.endswith(".java"):
                              # -- SYNTAX REPAIR & STABILITY --
                              content = re.sub(r'Typeface\.createFromAsset\s*\((?:[^()]|\([^()]*\))*\)(?:\.[a-zA-Z0-9_]+(\(\))?)*', 'Typeface.DEFAULT', content)
                              content = content.replace("Typeface.DEFAULT.getAssets()", "Typeface.DEFAULT")
                              
                              # Fix MDraw Rendering Crash
                              content = content.replace("yy <= VData.allSIZE.y + 1", "yy < VData.allSIZE.y")
                              content = content.replace("xx <= VData.allSIZE.x + 1", "xx < VData.allSIZE.x")
                              
                              # Fix VData Division by Zero
                              content = content.replace("landMap.baseCity[iniLocate] / landMap.baseX", 
                                                        "landMap.baseCity[iniLocate] / (landMap.baseX > 0 ? landMap.baseX : 1)")
                                                        
                              # SURGICAL Canvas Crash Fix (Targeted instead of global to prevent missing sprites)
                              # Only disables recycle if it's tied to the specific Movie stream bug in older Android versions
                              content = re.sub(r'if\s*\([^)]*mMovie\s*!=\s*null[^)]*\)\s*\{[^{}]*bitmap\.recycle\(\);[^{}]*\}', '/* movie recycle patched */', content)

                          with open(path, 'w', encoding='utf-8') as f:
                              f.write(content)
                      except Exception as e: 
                          print(f"Failed to process {file}: {e}")

          # 5. Build-Time Random Icon
          sprite_dir = 'app/src/main/res/drawable-hdpi'
          if os.path.exists(sprite_dir):
              sprites = [f for f in os.listdir(sprite_dir) if f.endswith('.png') and (f.startswith('pm') or f.startswith('sprite'))]
              if sprites:
                  chosen = random.choice(sprites)
                  print(f"Branding build with icon: {chosen}")
                  img = Image.open(os.path.join(sprite_dir, chosen)).convert("RGBA")
                  bg = Image.new('RGBA', (512, 512), (255, 255, 255, 255))
                  img_res = img.resize((400, 400), Image.Resampling.NEAREST)
                  bg.paste(img_res, (56, 56), img_res)
                  for folder, size in [('mipmap-mdpi', 48), ('mipmap-hdpi', 72), ('mipmap-xhdpi', 96), ('mipmap-xxhdpi', 144)]:
                      dest = os.path.join('app/src/main/res', folder, 'ic_launcher.png')
                      os.makedirs(os.path.dirname(dest), exist_ok=True)
                      bg.resize((size, size), Image.Resampling.LANCZOS).save(dest)

          # 6. Manifest Exported Fix
          m_path = 'app/src/main/AndroidManifest.xml'
          if os.path.exists(m_path):
              with open(m_path, 'r', encoding='utf-8') as f: content = f.read()
              content = re.sub(r'<activity([^>]*?)>', lambda m: f'<activity{m.group(1)}>' if 'android:exported' in m.group(1) else f'<activity{m.group(1)} android:exported="true">', content)
              with open(m_path, 'w', encoding='utf-8') as f: f.write(content)
          EOF

      - name: Build Debug APK
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-Stable-Dynamic
          path: app/build/outputs/apk/app-debug.apk
