name: Build WiiPM APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Generate Dynamic Icons
        run: |
          # Create a source if it's missing (using 'magick' instead of 'convert')
          if [ ! -f "icon_source.png" ]; then
            magick -size 512x512 xc:blue icon_source.png
          fi
          
          echo "Generating icons for all densities..."
          # Overwriting existing placeholders in your res/mipmap folders
          magick icon_source.png -resize 48x48   app/src/main/res/mipmap-mdpi/ic_launcher.png
          magick icon_source.png -resize 72x72   app/src/main/res/mipmap-hdpi/ic_launcher.png
          magick icon_source.png -resize 96x96   app/src/main/res/mipmap-xhdpi/ic_launcher.png
          magick icon_source.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png

      - name: Sanitize Gradle Wrapper
        run: |
          # This ensures the wrapper is executable and fixes potential Windows line ending issues
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
