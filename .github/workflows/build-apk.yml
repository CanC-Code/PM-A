name: Build WiiPM Stable & Deep Translated

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install 32-bit Libs
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libncurses6:i386 libstdc++6:i386 zlib1g:i386

      - name: Install SDK 23
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-23" "build-tools;23.0.2"

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Ultimate Multithreaded Translator & Mega-Patcher
        run: |
          pip install Pillow deep-translator
          # Notice the quotes around 'EOF' - this stops bash from eating our Regex backslashes!
          python - <<'EOF'
          import os, random, re, json, urllib.request
          from PIL import Image
          from deep_translator import GoogleTranslator
          from concurrent.futures import ThreadPoolExecutor, as_completed

          translator = GoogleTranslator(source='zh-CN', target='en')
          trans_cache = {}

          # Base UI Fallback Dictionary
          translations = {
              "图 鉴": "Dex", "地 图": "Map", "通 信": "Link", "记 录": "Save",
              "战 斗": "Fight", "队 伍": "Team", "物 品": "Bag", "逃 跑": "Run",
              "返 回": "Back", "属性": "Type", "特性": "Ability", "性格": "Nature",
              "物攻": "ATK", "物防": "DEF", "特攻": "SpA", "特防": "SpD", "速度": "SPD",
              "生命": "HP", "编号": "No.", "职业": "Class", "地区": "Region", "身份": "Rank",
              "技能": "Moves", "经验": "EXP"
          }

          print("Fetching official Pokémon names...")
          try:
              req = urllib.request.Request("https://raw.githubusercontent.com/sindresorhus/pokemon/main/data/en.json", headers={'User-Agent': 'Mozilla/5.0'})
              en_names = json.loads(urllib.request.urlopen(req).read().decode())
              req_zh = urllib.request.Request("https://raw.githubusercontent.com/sindresorhus/pokemon/main/data/zh-hans.json", headers={'User-Agent': 'Mozilla/5.0'})
              zh_names = json.loads(urllib.request.urlopen(req_zh).read().decode())
              for zh, en in zip(zh_names, en_names): translations[zh] = en
          except: pass

          # 1. Gather files & extract unique Chinese strings (including Java literals)
          print("Scanning files for translatable text...")
          files_to_process = []
          unique_chinese = set()

          for root, dirs, files in os.walk("."):
              for file in files:
                  path = os.path.join(root, file)
                  if file.endswith((".java", ".xml", ".txt", ".ini", ".dat")):
                      content = None
                      for encoding in ['utf-8', 'gbk', 'gb18030']:
                          try:
                              with open(path, 'r', encoding=encoding) as f:
                                  content = f.read()
                              break
                          except UnicodeDecodeError:
                              continue
                      
                      if content is None: continue

                      for cn, en in translations.items():
                          if cn in content: content = content.replace(cn, en)

                      if "assets" in path and file.endswith((".txt", ".xml", ".ini")):
                          files_to_process.append((path, content, "asset"))
                          for line in content.split('\n'):
                              if any(ext in line.lower() for ext in ['.png', '.jpg', '.gif']): continue
                              for match in re.findall(r'[\u4e00-\u9fff]+', line):
                                  if len(match) > 1: unique_chinese.add(match)
                      elif file.endswith(".java"):
                          files_to_process.append((path, content, "java"))
                          # Safely extract text from inside quotation marks in Java
                          for match in re.findall(r'"([^"\\]*(?:\\.[^"\\]*)*)"', content):
                              if re.search(r'[\u4e00-\u9fff]', match):
                                  unique_chinese.add(match)
                      else:
                          files_to_process.append((path, content, "other"))

          # 2. Multithreaded API Fetching
          print(f"Found {len(unique_chinese)} unique phrases. Starting parallel translation...")
          def fetch_translation(text):
              try: return text, translator.translate(text)
              except: return text, text

          completed = 0
          with ThreadPoolExecutor(max_workers=15) as executor:
              futures = {executor.submit(fetch_translation, text): text for text in unique_chinese}
              for future in as_completed(futures):
                  orig, trans = future.result()
                  trans_cache[orig] = trans
                  completed += 1
                  if completed % 50 == 0:
                      print(f"Translated {completed}/{len(unique_chinese)} phrases...")

          # 3. Apply Translations & Stability Fixes
          print("Applying translations and syntax patches to files...")
          for path, content, f_type in files_to_process:
              if f_type == "asset":
                  new_lines = []
                  for line in content.split('\n'):
                      if any(ext in line.lower() for ext in ['.png', '.jpg', '.gif']):
                          new_lines.append(line)
                          continue
                      for cn_text in re.findall(r'[\u4e00-\u9fff]+', line):
                          if len(cn_text) > 1 and cn_text in trans_cache:
                              line = line.replace(cn_text, trans_cache[cn_text])
                      new_lines.append(line)
                  content = '\n'.join(new_lines)

              if f_type == "java":
                  # Apply translations ONLY to strings inside quotes
                  def apply_java_trans(m):
                      text = m.group(1)
                      if re.search(r'[\u4e00-\u9fff]', text) and text in trans_cache:
                          return f'"{trans_cache[text]}"'
                      return m.group(0)
                  content = re.sub(r'"([^"\\]*(?:\\.[^"\\]*)*)"', apply_java_trans, content)

                  # CRITICAL FIX: Force Java to read asset files as UTF-8 instead of GBK to restore Sprites and Interactions
                  content = re.sub(r'(?i)"gbk"|"gb2312"|"gb18030"', '"utf-8"', content)

                  # UI SCALING FIX: Increase hardcoded text sizes by 2.5x for modern screens
                  def scale_text(m):
                      try:
                          val = float(m.group(1).replace('f', ''))
                          return f"setTextSize({val * 2.5}f)"
                      except:
                          return m.group(0)
                  content = re.sub(r'setTextSize\(\s*([0-9\.]+f?)\s*\)', scale_text, content)

                  # Old stability patches
                  content = re.sub(r'Typeface\.createFromAsset\s*\((?:[^()]|\([^()]*\))*\)(?:\.[a-zA-Z0-9_]+(\(\))?)*', 'Typeface.DEFAULT', content)
                  content = content.replace("Typeface.DEFAULT.getAssets()", "Typeface.DEFAULT")
                  content = content.replace("yy <= VData.allSIZE.y + 1", "yy < VData.allSIZE.y")
                  content = content.replace("xx <= VData.allSIZE.x + 1", "xx < VData.allSIZE.x")
                  content = content.replace("landMap.baseCity[iniLocate] / landMap.baseX", "landMap.baseCity[iniLocate] / (landMap.baseX > 0 ? landMap.baseX : 1)")
                  content = re.sub(r'if\s*\([^)]*mMovie\s*!=\s*null[^)]*\)\s*\{[^{}]*bitmap\.recycle\(\);[^{}]*\}', '/* movie recycle patched */', content)

              try:
                  with open(path, 'w', encoding='utf-8') as f:
                      f.write(content)
              except: pass

          # 4. Icon & Manifest
          sprite_dir = 'app/src/main/res/drawable-hdpi'
          if os.path.exists(sprite_dir):
              sprites = [f for f in os.listdir(sprite_dir) if f.endswith('.png') and (f.startswith('pm') or f.startswith('sprite'))]
              if sprites:
                  img = Image.open(os.path.join(sprite_dir, random.choice(sprites))).convert("RGBA")
                  bg = Image.new('RGBA', (512, 512), (255, 255, 255, 255))
                  img_res = img.resize((400, 400), Image.Resampling.NEAREST)
                  bg.paste(img_res, (56, 56), img_res)
                  for folder, size in [('mipmap-mdpi', 48), ('mipmap-hdpi', 72), ('mipmap-xhdpi', 96), ('mipmap-xxhdpi', 144)]:
                      dest = os.path.join('app/src/main/res', folder, 'ic_launcher.png')
                      os.makedirs(os.path.dirname(dest), exist_ok=True)
                      bg.resize((size, size), Image.Resampling.LANCZOS).save(dest)

          m_path = 'app/src/main/AndroidManifest.xml'
          if os.path.exists(m_path):
              with open(m_path, 'r', encoding='utf-8') as f: content = f.read()
              content = re.sub(r'<activity([^>]*?)>', lambda m: f'<activity{m.group(1)}>' if 'android:exported' in m.group(1) else f'<activity{m.group(1)} android:exported="true">', content)
              with open(m_path, 'w', encoding='utf-8') as f: f.write(content)
          EOF

      - name: Build Debug APK
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-Stable-Dynamic
          path: app/build/outputs/apk/app-debug.apk
