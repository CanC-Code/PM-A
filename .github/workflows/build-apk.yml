  test:
    needs: build
    runs-on: macos-latest # macOS is required for emulator hardware acceleration
    
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Download Built APK
        uses: actions/download-artifact@v4
        with:
          name: WiiPM-Fixed-Launcher-APK
          path: .

      - name: Run Emulator and Check for Crashes
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 23
          target: default
          arch: x86
          profile: Nexus 6
          script: |
            # 1. Install the APK (finding it in the root from download-artifact)
            APK_PATH=$(find . -name "*.apk" | head -n 1)
            adb install "$APK_PATH"
            
            # 2. Clear logs and start the app
            adb logcat -c
            echo "Launching WiiPM..."
            adb shell am start -n com.yurset.wiipm/com.yurset.wiipm.main.Activity_Main
            
            # 3. Wait for it to stabilize or crash
            sleep 15
            
            # 4. Dump logs and search for fatal errors
            adb logcat -d > full_log.txt
            if grep -E "FATAL EXCEPTION|AndroidRuntime|ClassNotFoundException" full_log.txt; then
              echo "------------------------------------------------"
              echo "!!! CRASH DETECTED IN AUTOMATED TEST !!!"
              echo "------------------------------------------------"
              grep -A 20 -E "FATAL EXCEPTION|AndroidRuntime|ClassNotFoundException" full_log.txt
              exit 1
            else
              echo "App launched without immediate fatal errors."
            fi

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Smoke-Test-Logs
          path: full_log.txt
