name: Build WiiPM APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (for SDK Manager)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Legacy Android SDK 23 & Build Tools 23.0.2
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-23" "build-tools;23.0.2"

      - name: Set up JDK 8 (for Build)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Optimize Repositories and Assets
        run: |
          pip install Pillow
          python - <<EOF
          import os, random
          from PIL import Image

          # 1. Fix JCenter/Google Repository Shorthand
          # Gradle 2.2.1 doesn't know google(), it needs the full maven URL
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file == "build.gradle":
                      path = os.path.join(root, file)
                      with open(path, 'r') as f:
                          content = f.read()
                      
                      # Replace JCenter with explicit Maven Central and Google URLs
                      new_content = content.replace("jcenter()", "mavenCentral()\n        maven { url 'https://maven.google.com' }")
                      
                      with open(path, 'w') as f:
                          f.write(new_content)
                      print(f"Optimized repositories in {path}")

          # 2. Legacy Storage & Manifest Fix
          manifest_path = 'app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest_path):
              with open(manifest_path, 'r') as f:
                  content = f.read()
              if 'android:requestLegacyExternalStorage' not in content:
                  content = content.replace('<application', '<application android:requestLegacyExternalStorage="true"')
                  with open(manifest_path, 'w') as f:
                      f.write(content)

          # 3. Generate Random Pokémon Icon
          sprite_dir = 'app/src/main/res/drawable-hdpi'
          if os.path.exists(sprite_dir):
              sprites = [f for f in os.listdir(sprite_dir) if f.startswith('pm') and f.endswith('.png')]
              chosen = random.choice(sprites) if sprites else None
              sprite_img = Image.open(os.path.join(sprite_dir, chosen)).convert("RGBA") if chosen else Image.new('RGBA', (128, 128), color=(0, 120, 215, 255))
              bg = Image.new('RGBA', (512, 512), color=(255, 255, 255, 255))
              sprite_img = sprite_img.resize((400, 400), Image.Resampling.NEAREST)
              bg.paste(sprite_img, (56, 56), sprite_img)
              
              targets = [('mipmap-mdpi', 48), ('mipmap-hdpi', 72), ('mipmap-xhdpi', 96), ('mipmap-xxhdpi', 144)]
              for folder, size in targets:
                  dest_dir = os.path.join('app/src/main/res', folder)
                  os.makedirs(dest_dir, exist_ok=True)
                  bg.resize((size, size), Image.Resampling.LANCZOS).save(os.path.join(dest_dir, 'ic_launcher.png'))
          EOF

      - name: Sanitize and Fix Gradle
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
