name: Build WiiPM Stable

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install 32-bit Libs (Ubuntu 24.04)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libncurses6:i386 libstdc++6:i386 zlib1g:i386

      - name: Install SDK 23
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-23" "build-tools;23.0.2"

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Mega-Patcher (Translation, Icons, & Stability)
        run: |
          pip install Pillow
          python - <<EOF
          import os, random, re
          from PIL import Image

          # 1. Translation Dictionary
          translations = {
              "图 鉴": "PokéDex", "地 图": "Map", "通 信": "Link", "记 录": "Save",
              "战 斗": "Fight", "队 伍": "Team", "物 品": "Bag", "逃 跑": "Run",
              "返 回": "Back", "属性": "Type", "特性": "Ability", "性格": "Nature",
              "物攻": "ATK", "物防": "DEF", "特攻": "SpA", "特防": "SpD", "速度": "SPD",
              "生命": "HP", "编号": "No.", "职业": "Class", "地区": "Region", "身份": "Rank"
          }

          # 2. Process Java Files Surgically
          for root, dirs, files in os.walk("app/src/main/java"):
              for file in files:
                  if file.endswith(".java"):
                      path = os.path.join(root, file)
                      with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                          lines = f.readlines()
                      
                      new_lines = []
                      for line in lines:
                          # Fix Font Crashes: Replace the whole assignment line if it contains createFromAsset
                          if "Typeface.createFromAsset" in line:
                              var_name = line.split('=')[0].strip()
                              line = f"        {var_name} = Typeface.DEFAULT;\n"
                          
                          # Fix MDraw Loop Boundary
                          if "yy <= VData.allSIZE.y + 1" in line:
                              line = line.replace("yy <= VData.allSIZE.y + 1", "yy < VData.allSIZE.y")
                          if "xx <= VData.allSIZE.x + 1" in line:
                              line = line.replace("xx <= VData.allSIZE.x + 1", "xx < VData.allSIZE.x")
                          
                          # Fix Division by Zero in VData
                          if "landMap.baseCity[iniLocate] / landMap.baseX" in line:
                              line = line.replace("landMap.baseX", "(landMap.baseX > 0 ? landMap.baseX : 1)")

                          # Apply Translations
                          for cn, en in translations.items():
                              line = line.replace(f'"{cn}"', f'"{en}"')
                          
                          new_lines.append(line)
                      
                      with open(path, 'w', encoding='utf-8') as f:
                          f.writelines(new_lines)

          # 3. Build-Time Icon Randomizer
          sprite_dir = 'app/src/main/res/drawable-hdpi'
          if os.path.exists(sprite_dir):
              # Find all sprites starting with 'pm' or 'sprite'
              sprites = [f for f in os.listdir(sprite_dir) if f.endswith('.png') and (f.startswith('pm') or f.startswith('sprite'))]
              if sprites:
                  chosen = random.choice(sprites)
                  print(f"Randomly selected icon: {chosen}")
                  sprite_path = os.path.join(sprite_dir, chosen)
                  img = Image.open(sprite_path).convert("RGBA")
                  
                  # Create high-quality icon on white background
                  bg = Image.new('RGBA', (512, 512), (255, 255, 255, 255))
                  img_resized = img.resize((400, 400), Image.Resampling.NEAREST)
                  bg.paste(img_resized, (56, 56), img_resized)
                  
                  # Replace all launcher icons
                  for folder, size in [('mipmap-mdpi', 48), ('mipmap-hdpi', 72), ('mipmap-xhdpi', 96), ('mipmap-xxhdpi', 144)]:
                      dest = os.path.join('app/src/main/res', folder, 'ic_launcher.png')
                      os.makedirs(os.path.dirname(dest), exist_ok=True)
                      bg.resize((size, size), Image.Resampling.LANCZOS).save(dest)

          # 4. Manifest Exported Fix
          m_path = 'app/src/main/AndroidManifest.xml'
          if os.path.exists(m_path):
              with open(m_path, 'r') as f: content = f.read()
              if 'android:exported' not in content:
                  content = content.replace('android:name=".main.Activity_Main"', 'android:name=".main.Activity_Main" android:exported="true"')
              with open(m_path, 'w') as f: f.write(content)
          EOF

      - name: Build APK
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-RandomIcon-Build
          path: app/build/outputs/apk/app-debug.apk
