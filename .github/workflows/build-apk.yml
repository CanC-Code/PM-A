name: Build WiiPM APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install 32-bit Compatibility Libs
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libncurses6:i386 libstdc++6:i386 zlib1g:i386

      - name: Install SDK 23
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-23" "build-tools;23.0.2"

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Surgical Source Patcher
        run: |
          python - <<EOF
          import os, re

          def safe_patch():
              # 1. Manifest Repair (Critical for Launch)
              manifest_path = 'app/src/main/AndroidManifest.xml'
              if os.path.exists(manifest_path):
                  with open(manifest_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  # Ensure exported is true for the launcher
                  if 'android:exported' not in content:
                      content = content.replace('android:name=".main.Activity_Main"', 
                                               'android:name=".main.Activity_Main" android:exported="true"')
                  with open(manifest_path, 'w', encoding='utf-8') as f:
                      f.write(content)

              # 2. Logic & UI Fixes
              for root, dirs, files in os.walk("app/src/main/java"):
                  for file in files:
                      if file.endswith(".java"):
                          path = os.path.join(root, file)
                          with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                              lines = f.readlines()
                          
                          new_lines = []
                          for line in lines:
                              # Fix font crashes by using system default
                              if "Typeface.createFromAsset" in line:
                                  line = re.sub(r'Typeface\.createFromAsset\(.*?\)', 'Typeface.DEFAULT', line)
                              
                              # Fix MDraw loop boundary crashes
                              if "yy <= VData.allSIZE.y + 1" in line:
                                  line = line.replace("yy <= VData.allSIZE.y + 1", "yy < VData.allSIZE.y")
                              if "xx <= VData.allSIZE.x + 1" in line:
                                  line = line.replace("xx <= VData.allSIZE.x + 1", "xx < VData.allSIZE.x")
                                  
                              # Translation (Common UI Elements)
                              line = line.replace('"图 鉴"', '"Dex"').replace('"地 图"', '"Map"')
                              line = line.replace('"战 斗"', '"Fight"').replace('"队 伍"', '"Team"')
                              line = line.replace('"物 品"', '"Bag"').replace('"逃 跑"', '"Run"')
                              
                              new_lines.append(line)
                          
                          with open(path, 'w', encoding='utf-8') as f:
                              f.writelines(new_lines)

              # 3. Build Configuration
              if os.path.exists('app/build.gradle'):
                  with open('app/build.gradle', 'r') as f:
                      content = f.read()
                  content = content.replace("jcenter()", "mavenCentral()")
                  content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 26', content)
                  with open('app/build.gradle', 'w') as f:
                      f.write(content)

          safe_patch()
          EOF

      - name: Build APK
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-Debug-Build
          path: app/build/outputs/apk/app-debug.apk
