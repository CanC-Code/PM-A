name: Build WiiPM APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Build Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Legacy 32-bit Compatibility Libs
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libncurses6:i386 libstdc++6:i386 zlib1g:i386

      - name: Install SDK 23
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-23" "build-tools;23.0.2"

      - name: Set up JDK 8 (Compile)
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: gradle

      - name: Surgical Source Patcher & Translator
        run: |
          pip install Pillow
          python - <<EOF
          import os, random, re
          from PIL import Image

          # 1. Translation Dictionary (Chinese -> English)
          translations = {
              "提示": "Notice",
              "是否确认退出游戏？": "Are you sure you want to quit?",
              "取消": "Cancel",
              "确认": "Confirm",
              "开始游戏": "Start Game",
              "退出游戏": "Exit Game",
              "生命": "HP",
              "攻击": "ATK",
              "防御": "DEF",
              "速度": "SPD",
              "等级": "LVL",
              "背包": "Bag"
          }

          def translate_file(file_path):
              try:
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  for cn, en in translations.items():
                      content = content.replace(cn, en)
                  # Global Regex: Replace most Chinese characters with '...' to prevent crashes if unknown
                  # content = re.sub(r'[\u4e00-\u9fff]+', '?', content) 
                  with open(file_path, 'w', encoding='utf-8') as f:
                      f.write(content)
              except: pass

          # 2. Global Code & Logic Patching
          for root, dirs, files in os.walk("."):
              for file in files:
                  path = os.path.join(root, file)
                  
                  # Apply Translations to Java and XML
                  if file.endswith((".java", ".xml")):
                      translate_file(path)

                  # Logic Fix: VData.java (Movement Crash)
                  if file == "VData.java":
                      with open(path, 'r') as f: content = f.read()
                      # Add Null Check to ableMove to prevent crash on logicMap access
                      content = content.replace(
                          "if (MDraw.logicMap[y][x] > 2",
                          "if (MDraw.logicMap != null && y >= 0 && y < MDraw.logicMap.length && x >= 0 && x < MDraw.logicMap[0].length && MDraw.logicMap[y][x] > 2"
                      )
                      with open(path, 'w') as f: f.write(content)

                  # Logic Fix: Build/Manifest Compatibility
                  if file == "build.gradle":
                      with open(path, 'r') as f: content = f.read()
                      content = content.replace("jcenter()", "maven { url 'https://maven.google.com' }\n        mavenCentral()")
                      content = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 26', content)
                      with open(path, 'w') as f: f.write(content)

          # 3. Dynamic Icon Generation
          sprite_dir = 'app/src/main/res/drawable-hdpi'
          if os.path.exists(sprite_dir):
              sprites = [f for f in os.listdir(sprite_dir) if f.startswith('pm') and f.endswith('.png')]
              chosen = random.choice(sprites) if sprites else None
              if chosen:
                  sprite_img = Image.open(os.path.join(sprite_dir, chosen)).convert("RGBA")
                  bg = Image.new('RGBA', (512, 512), (255, 255, 255, 255))
                  sprite_img = sprite_img.resize((400, 400), Image.Resampling.NEAREST)
                  bg.paste(sprite_img, (56, 56), sprite_img)
                  for folder, size in [('mipmap-mdpi', 48), ('mipmap-hdpi', 72), ('mipmap-xhdpi', 96), ('mipmap-xxhdpi', 144)]:
                      dest_dir = os.path.join('app/src/main/res', folder)
                      os.makedirs(dest_dir, exist_ok=True)
                      bg.resize((size, size), Image.Resampling.LANCZOS).save(os.path.join(dest_dir, 'ic_launcher.png'))
          EOF

      - name: Build Debug APK
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WiiPM-English-Patched
          path: app/build/outputs/apk/app-debug.apk
